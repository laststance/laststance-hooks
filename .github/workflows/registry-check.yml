name: Registry Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: registry-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  registry-check:
    name: Registry Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Prepare environment
        uses: ./.github/actions/prepare

      - name: Run registry check
        run: pnpm registry:check
